name: manga-learning-stack

services:
  suwayomi-server:
    image: ghcr.io/suwayomi/suwayomi-server:stable
    container_name: Suwayomi-Server
    volumes:
      - ./downloads:/home/suwayomi/.local/share/Tachidesk/downloads
      - ./files:/home/suwayomi/.local/share/Tachidesk
    ports:
      - "4568:4567"
    restart: unless-stopped

  webui:
    build:
      context: ../Suwayomi-WebUI-jl
    container_name: suwayomi-webui-jl
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - suwayomi-server

  learning-service:
    build:
      context: ../manga-learning-service
    container_name: manga-learning-service
    restart: unless-stopped
    ports:
      - "8765:8765"
    environment:
      - MANGA_LEARNING_HOST=0.0.0.0
      - MANGA_LEARNING_PORT=8765
      - MANGA_LEARNING_CACHE_DB_PATH=/data/cache.db
      - MANGA_LEARNING_OCR_BACKEND=mokuro
      - MANGA_LEARNING_OCR_FORCE_CPU=${MANGA_LEARNING_OCR_FORCE_CPU:-true}
      - MANGA_LEARNING_MANGA_SERVER_URL=${MANGA_LEARNING_MANGA_SERVER_URL:-http://suwayomi-server:4567}
      - MANGA_LEARNING_OCR_PAGE_RATIO_MIN=${MANGA_LEARNING_OCR_PAGE_RATIO_MIN:-1.25}
      - MANGA_LEARNING_OCR_PAGE_RATIO_MAX=${MANGA_LEARNING_OCR_PAGE_RATIO_MAX:-1.85}
      - MANGA_LEARNING_OCR_MIN_PAGES=${MANGA_LEARNING_OCR_MIN_PAGES:-8}
      - MANGA_LEARNING_OCR_MAX_PAGES=${MANGA_LEARNING_OCR_MAX_PAGES:-25}
      - MANGA_LEARNING_ANKI_ENABLED=true
      - MANGA_LEARNING_OCR_CACHE_TTL_SECONDS=${MANGA_LEARNING_OCR_CACHE_TTL_SECONDS:-86400}
      - MANGA_LEARNING_AI_ENABLED=${MANGA_LEARNING_AI_ENABLED:-false}
      - MANGA_LEARNING_AI_PROVIDER=minimax
      - MANGA_LEARNING_AI_MINIMAX_API_KEY=${MANGA_LEARNING_AI_MINIMAX_API_KEY:-}
      - MANGA_LEARNING_AI_MINIMAX_BASE_URL=${MANGA_LEARNING_AI_MINIMAX_BASE_URL:-https://api.minimax.io/v1}
      - MANGA_LEARNING_AI_MINIMAX_MODEL=${MANGA_LEARNING_AI_MINIMAX_MODEL:-MiniMax-M3}
    volumes:
      - learning-data:/data
      - learning-models:/root/.cache/manga-ocr
      - learning-hf-cache:/root/.cache/huggingface

volumes:
  learning-data:
  learning-models:
  learning-hf-cache: